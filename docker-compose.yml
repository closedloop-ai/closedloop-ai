# Local development services for Symphony
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16
    container_name: symphony-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: symphony
    ports:
      - "5432:5432"
    volumes:
      - symphony_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d symphony"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  symphony_postgres_data:
