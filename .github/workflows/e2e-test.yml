name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Preview URL to test against (leave empty to auto-resolve for the current branch)"
        required: false
        type: string
      ref:
        description: "Branch name or SHA to test"
        required: false
        type: string

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: "${{ github.event.pull_request.head.sha || github.event.inputs.ref || github.ref }}"

      - name: Resolve target ref
        id: target-ref
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUT_REF: ${{ inputs.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_HEAD_REF" ]; then
            REF_NAME="$PR_HEAD_REF"
          elif [ -n "$INPUT_REF" ]; then
            REF_NAME="${INPUT_REF#refs/heads/}"
            REF_NAME="${REF_NAME#origin/}"
          else
            REF_NAME="$GITHUB_REF_NAME"
          fi

          if [ -z "$REF_NAME" ] || [ "$REF_NAME" = "HEAD" ]; then
            echo "::error::Failed to resolve target ref name"
            exit 1
          fi

          SHA="$(git rev-parse HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Wait for Vercel app-stage preview deployment
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.deployment_url == ''
        id: wait
        uses: actions/github-script@v8
        with:
          script: |
            const sha = process.env.TARGET_SHA || context.payload.pull_request?.head?.sha || context.sha;
            const MAX_ATTEMPTS = 60;      // 60 * 10s = 10 minutes
            const DELAY_MS = 10_000;
            const ALLOWLIST =
              /^https:\/\/(app\.closedloop-stage\.ai|app-stage-[a-z0-9-]+\.preview\.closedloop-stage\.ai)(\/.*)?$/;

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                per_page: 30,
              });

              const appStage = deployments.find(
                (d) =>
                  typeof d.environment === "string" &&
                  d.environment.toLowerCase().includes("app-stage") &&
                  d.creator?.login === "vercel[bot]"
              );

              if (appStage) {
                const { data: statuses } =
                  await github.rest.repos.listDeploymentStatuses({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    deployment_id: appStage.id,
                  });
                const latest = statuses[0];
                if (latest?.state === "success" && latest.environment_url) {
                  if (!ALLOWLIST.test(latest.environment_url)) {
                    core.setFailed(
                      `Unexpected preview URL pattern: ${latest.environment_url}`
                    );
                    return;
                  }
                  core.info(`✓ app-stage preview ready: ${latest.environment_url}`);
                  core.setOutput("url", latest.environment_url);
                  return;
                }
                if (latest?.state === "failure" || latest?.state === "error") {
                  core.setFailed(`Preview deployment ${latest.state}`);
                  return;
                }
              }

              core.info(
                `Waiting for app-stage preview (attempt ${attempt}/${MAX_ATTEMPTS})...`
              );
              await new Promise((r) => setTimeout(r, DELAY_MS));
            }

            core.setFailed("Timed out waiting for app-stage preview deployment");
        env:
          TARGET_SHA: ${{ steps.target-ref.outputs.sha }}

      - name: Resolve preview URLs
        id: base-url
        run: |
          if [ -z "$REF_NAME" ]; then
            echo "::error::Failed to resolve preview URLs from branch ref"
            exit 1
          fi

          if [ -n "$INPUT_DEPLOY_URL" ]; then
            BASE_URL="${INPUT_DEPLOY_URL%/}"
          elif [ "$REF_NAME" = "main" ] && [ "$EVENT_NAME" != "pull_request" ]; then
            BASE_URL="https://app.closedloop-stage.ai"
          else
            NORMALIZED_REF="$(printf '%s' "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9]+#-#g; s#(^-+|-+$)##g')"
            BASE_URL="https://app-stage-git-${NORMALIZED_REF}.preview.closedloop-stage.ai"
          fi

          if [[ "$BASE_URL" =~ ^https://app-stage-git-([a-z0-9-]+)\.preview\.closedloop-stage\.ai$ ]]; then
            API_BASE_URL="https://api-stage-git-${BASH_REMATCH[1]}.preview.closedloop-stage.ai"
          elif [[ "$BASE_URL" = "https://app.closedloop-stage.ai" ]]; then
            API_BASE_URL="https://api.closedloop-stage.ai"
          else
            echo "::error::Could not derive API_BASE_URL from BASE_URL=$BASE_URL"
            exit 1
          fi

          echo "Resolved BASE_URL=$BASE_URL"
          echo "Resolved API_BASE_URL=$API_BASE_URL"
          echo "url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
        env:
          INPUT_DEPLOY_URL: ${{ inputs.deployment_url }}
          REF_NAME: ${{ steps.target-ref.outputs.ref_name }}
          EVENT_NAME: ${{ github.event_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # prisma generate (runs via postinstall) only needs the URL format, not a live DB
          DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: "${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}"

      - name: Install Playwright browsers and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm exec playwright test
        env:
          CI: "true"
          PLAYWRIGHT_FORCE_TTY: "0"
          BASE_URL: ${{ steps.base-url.outputs.url }}
          API_BASE_URL: ${{ steps.base-url.outputs.api_url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.STAGING_CLERK_SECRET_KEY }}
          DEVOPS_CLOSEDLOOP_APP_PWD: ${{ secrets.DEVOPS_CLOSEDLOOP_APP_PWD }}

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: "e2e-failure-${{ github.run_id }}"
          path: |
            playwright-report/
            test-results/
          retention-days: 7
