name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # prisma generate (runs via postinstall) only needs the URL format, not a live DB
          DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # prisma generate (runs via postinstall) only needs the URL format, not a live DB
          DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: TypeScript type check
        run: pnpm typecheck --concurrency=2
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Figma Code Connect type check
        run: pnpm --filter @repo/design-system figma:typecheck

  storybook-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # prisma generate (runs via postinstall) only needs the URL format, not a live DB
          DATABASE_URL: postgresql://localhost:5432/placeholder

      # Storybook resolves @closedloop-ai/design-system through its package
      # `exports` map to the built dist/, so the design-system (and its workspace
      # deps, e.g. loops-api, whose dist/*.d.ts the design-system DTS build needs)
      # must be compiled before `storybook build`. `storybook build` runs the app
      # script directly and does not trigger turbo `^build`, so build it here.
      - name: Build workspace dependencies (design-system + deps)
        run: pnpm turbo build --filter=@closedloop-ai/design-system
        env:
          DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: Build Storybook
        run: pnpm --filter storybook build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/database && pnpm prisma generate
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Apply database migrations
        run: cd packages/database && pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - name: Run tests
        run: pnpm test --filter=app --filter=api
        env:
          # Standard PostgreSQL connection (not AWS RDS IAM auth)
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test
          # Explicitly disable any AWS-specific auth
          AWS_REGION: ""
          AWS_EXECUTION_ENV: ""

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
