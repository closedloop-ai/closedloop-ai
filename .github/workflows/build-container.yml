name: Build Claude Runner Container

on:
  push:
    branches: [main]
    paths:
      - "containers/claude-runner/**"
  workflow_dispatch: {}

concurrency:
  group: build-container-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REPOSITORY: cl-ai-claude-runner
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.environment }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write # For OIDC and provenance attestation
      contents: read
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: stage
            role_arn: arn:aws:iam::661041595751:role/github-actions/github-actions-terraform
          - environment: prod
            role_arn: arn:aws:iam::959853091217:role/github-actions/github-actions-terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate plugin repo token
        id: plugin-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PLUGIN_APP_ID }}
          private-key: ${{ secrets.PLUGIN_APP_PRIVATE_KEY }}
          owner: closedloop-ai
          repositories: claude-plugins

      - name: Configure AWS Credentials (${{ matrix.environment }})
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: containers/claude-runner
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            GITHUB_TOKEN=${{ steps.plugin-token.outputs.token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Write image digest
        run: echo "${{ steps.build.outputs.digest }}" > digest.txt

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-${{ matrix.environment }}
          path: digest.txt
