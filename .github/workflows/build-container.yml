name: Build Claude Runner Container

on:
  push:
    branches: [main]
    paths:
      - "containers/claude-runner/**"
  workflow_dispatch: {}

concurrency:
  group: build-container-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REPOSITORY: cl-ai-claude-runner
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.environment }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write # For OIDC
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: stage
            role_arn: arn:aws:iam::661041595751:role/github-actions/github-actions-terraform
          - environment: prod
            role_arn: arn:aws:iam::959853091217:role/github-actions/github-actions-terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (${{ matrix.environment }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/claude-runner
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.PLUGIN_REPO_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
