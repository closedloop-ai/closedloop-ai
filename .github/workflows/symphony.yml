name: Symphony

on:
  issue_comment:
    types: [created]

env:
  NODE_VERSION: "20"

jobs:
  # Fast job to detect command type and skip irrelevant triggers
  detect:
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@symphony-cl')
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.detect.outputs.command }}
    steps:
      - name: Detect Symphony Command
        id: detect
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [[ "$COMMENT_BODY" == *"@symphony-cl plan"* ]]; then
            echo "command=plan" >> "$GITHUB_OUTPUT"
          elif [[ "$COMMENT_BODY" == *"@symphony-cl answer"* ]]; then
            echo "command=answer" >> "$GITHUB_OUTPUT"
          elif [[ "$COMMENT_BODY" == *"@symphony-cl execute"* ]]; then
            echo "command=execute" >> "$GITHUB_OUTPUT"
          else
            # Fallback: any @symphony-cl mention without recognized command
            echo "command=chat" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # PLAN: Generate implementation plan from GitHub issue
  # Triggered by: @symphony-cl plan
  # Output: Open questions OR implementation plan
  # ============================================================================
  plan:
    needs: detect
    if: needs.detect.outputs.command == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: symphony-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
      id-token: write

    steps:
      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLOSEDLOOP_APP_ID_STAGE }}
          private-key: ${{ secrets.CLOSEDLOOP_APP_SECRET_STAGE }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},claude_code
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-actions: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ steps.token.outputs.token }}

      - name: Check for Existing Plan
        id: check_existing
        continue-on-error: true
        uses: ./.github/actions/symphony-artifact
        with:
          mode: download
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}

      - name: Check if Plan Already Exists
        id: check_plan
        run: |
          RUN_DIR="${{ steps.check_existing.outputs.run_dir }}"
          if [ -n "$RUN_DIR" ] && { [ -f "${RUN_DIR}/plan.json" ] || [ -f "${RUN_DIR}/plan.md" ] || [ -f "${RUN_DIR}/implementation-plan.md" ]; }; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post Warning if Plan Exists
        if: steps.check_plan.outputs.exists == 'true'
        uses: ./.github/actions/post-status-comment
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          message: "⚠️ **Plan artifacts already exist for this issue.** Use `@symphony-cl execute` to implement it, or `@symphony-cl <request>` to amend it."
          github_token: ${{ steps.token.outputs.token }}

      - name: Fail if Plan Already Exists
        if: steps.check_plan.outputs.exists == 'true'
        run: exit 1

      - name: Symphony Setup
        id: setup
        uses: ./.github/actions/symphony-setup
        with:
          github_token: ${{ steps.token.outputs.token }}
          node_version: ${{ env.NODE_VERSION }}

      - name: Setup Claude CLI
        id: cli_setup
        uses: ./.github/actions/claude-cli-setup
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}

      - name: Post Status Comment
        id: status_comment
        uses: ./.github/actions/post-status-comment
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          message: "Generating plan..."
          github_token: ${{ steps.token.outputs.token }}

      - name: Prepare Issue Content
        id: issue_content
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          BODY=$(echo "$ISSUE_BODY" | tr '\n\r' '  ' | sed 's/  */ /g')
          CONTENT="${ISSUE_TITLE}: ${BODY}"
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Fetch Issue Attachments
        id: attachments
        uses: ./.github/actions/fetch-issue-attachments
        with:
          issue_body: ${{ github.event.issue.body }}
          github_token: ${{ steps.token.outputs.token }}
          repo: ${{ github.repository }}

      - name: Setup Workdir
        id: setup_workdir
        run: |
          WORKDIR=".claude/runs/$(date -u +%Y%m%d-%H%M%S)-issue-${{ github.event.issue.number }}"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "Created workdir: $WORKDIR"

      - name: Write PRD
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          WORKDIR="${{ steps.setup_workdir.outputs.workdir }}"
          {
            echo "$ISSUE_TITLE"
            echo ""
            echo "$ISSUE_BODY"
          } > "$WORKDIR/prd.md"
          echo "PRD written to $WORKDIR/prd.md"

      - name: Run Symphony Plan (experimental)
        id: symphony
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          WORKDIR="${{ steps.setup_workdir.outputs.workdir }}"
          RUN_LOOP="${{ steps.cli_setup.outputs.run_loop_path }}"

          # Copy attachments if they exist
          if [ -d ".claude/attachments" ] && [ "$(ls -A .claude/attachments 2>/dev/null)" ]; then
            mkdir -p "$WORKDIR/attachments"
            cp -r .claude/attachments/* "$WORKDIR/attachments/"
            echo "Copied attachments to $WORKDIR/attachments/"
          fi

          # Run the experimental loop
          "$RUN_LOOP" "$WORKDIR" --prd "$WORKDIR/prd.md" --max-iterations 50 2>&1 | tee "$WORKDIR/run-loop.log"

          echo "Run loop completed. Workdir: $WORKDIR"

      - name: Post Results
        id: post_results
        uses: ./.github/actions/symphony-post-results
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          comment_url: ${{ steps.status_comment.outputs.comment_url }}

      - name: Update Status Comment on Failure
        if: failure()
        uses: ./.github/actions/update-comment-on-failure
        with:
          comment_url: ${{ steps.status_comment.outputs.comment_url }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          action_name: generate plan

      - name: Upload Artifact
        if: always()
        id: upload
        uses: ./.github/actions/symphony-artifact
        with:
          mode: upload
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}

      - name: Sanitize Run Loop Log
        if: always()
        uses: ./.github/actions/sanitize-run-log
        with:
          log_file: ${{ steps.setup_workdir.outputs.workdir }}/run-loop.log

      - name: Upload Run Loop Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: run-loop-log-${{ github.event.issue.number }}
          path: ${{ steps.setup_workdir.outputs.workdir }}/run-loop.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify Symphony Completion
        id: verify_completion
        run: |
          WORKDIR="${{ steps.setup_workdir.outputs.workdir }}"

          # Check workdir exists
          if [ ! -d "$WORKDIR" ]; then
            echo "::error::Symphony failed - workdir not found: $WORKDIR"
            exit 1
          fi

          echo "Run directory contents:"
          ls -la "$WORKDIR"

          # Check for minimum viable output
          # The experimental run-loop deletes its state file (.claude/symphony-loop.local.md) on
          # successful completion, so we verify success by checking for expected output artifacts
          if [ ! -f "$WORKDIR/plan.json" ] && [ ! -f "$WORKDIR/plan.md" ] && [ ! -f "$WORKDIR/implementation-plan.md" ]; then
            echo "::error::No plan output found. At least one of plan.json, plan.md, or implementation-plan.md must exist"
            exit 1
          fi
          echo "✅ Minimum viable output check passed"

          # Check for open questions (indicates awaiting user input)
          if [ -f "$WORKDIR/investigation-questions.md" ]; then
            echo "::notice::Symphony generated questions - awaiting user input"
          fi

          echo "✅ Symphony plan completed successfully"

      - name: Handle AWAITING_USER Status
        if: steps.verify_completion.outputs.status == 'AWAITING_USER'
        run: |
          PHASE="${{ steps.verify_completion.outputs.phase }}"
          COMMENT_URL="${{ steps.status_comment.outputs.comment_url }}"
          WORKDIR="${{ steps.setup_workdir.outputs.workdir }}"

          # Determine phase-specific continuation instructions
          case "$PHASE" in
            1.1)
              # Link to plan.md in the workdir
              PLAN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              MESSAGE="📋 **Implementation plan ready for review.**

          Review the implementation plan in the [workflow artifact]($PLAN_URL).

          When ready to proceed, comment \`@symphony-cl execute\` to begin implementation."
              ;;
            1.2)
              MESSAGE="❓ **Open questions require your input.**

          Please answer the questions posted above.

          When ready, comment \`@symphony-cl answer\` with your answers."
              ;;
            *)
              MESSAGE="⏸️ **Workflow paused.** Please check the status comment for next steps.

          To continue, comment \`@symphony-cl execute\`."
              ;;
          esac

          # Post comment via GitHub API
          if [ -n "$COMMENT_URL" ]; then
            COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
            if [ -n "$COMMENT_ID" ]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                -f body="$MESSAGE" || true
            fi
          fi
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Build Slack Message
        if: success()
        id: slack_message
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          ISSUE_URL="${{ github.server_url }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
          RESULT_TYPE="${{ steps.post_results.outputs.result_type }}"
          COMMENT_URL="${{ steps.post_results.outputs.comment_url }}"
          ARTIFACT_URL="${{ steps.upload.outputs.artifact_url }}"

          if [ "$RESULT_TYPE" = "questions" ]; then
            STATUS="Pending Answers"
            STATUS_LINE="Open questions: ${COMMENT_URL}"
          else
            STATUS="Plan ready for review"
            STATUS_LINE="Implementation plan: ${COMMENT_URL}"
          fi

          MSG=$(printf "<%s|#%s: %s>\nAssignees: {assignees}\nStatus: %s\n%s\nRun artifact: %s" \
            "$ISSUE_URL" "${{ github.event.issue.number }}" "$ISSUE_TITLE" "$STATUS" "$STATUS_LINE" "${ARTIFACT_URL:-N/A}")

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: ./.github/actions/symphony-slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_SYMPHONY_WEBHOOK_URL }}
          message: ${{ steps.slack_message.outputs.message }}
          assignees_json: ${{ toJson(github.event.issue.assignees) }}

  # ============================================================================
  # ANSWER: Process user answers and generate final implementation plan
  # Triggered by: @symphony-cl answer
  # Requires: Previous @symphony-cl plan run with questions
  # Output: Implementation plan
  # ============================================================================
  answer:
    needs: detect
    if: needs.detect.outputs.command == 'answer'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: symphony-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
      actions: write
      id-token: write

    steps:
      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLOSEDLOOP_APP_ID_STAGE }}
          private-key: ${{ secrets.CLOSEDLOOP_APP_SECRET_STAGE }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},claude_code
          permission-contents: read
          permission-issues: write
          permission-actions: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ steps.token.outputs.token }}

      - name: Symphony Setup
        id: setup
        uses: ./.github/actions/symphony-setup
        with:
          github_token: ${{ steps.token.outputs.token }}
          node_version: ${{ env.NODE_VERSION }}

      - name: Setup Claude CLI
        id: cli_setup
        uses: ./.github/actions/claude-cli-setup
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}

      - name: Post Status Comment
        id: status_comment
        uses: ./.github/actions/post-status-comment
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          message: "Processing user answers..."
          github_token: ${{ steps.token.outputs.token }}

      - name: Download Previous Run Artifact
        id: download
        uses: ./.github/actions/symphony-artifact
        with:
          mode: download
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}

      - name: Validate Artifact Ownership
        uses: ./.github/actions/validate-artifact-ownership
        with:
          run_dir: ${{ steps.download.outputs.run_dir }}
          issue_number: ${{ github.event.issue.number }}

      - name: Verify Run Directory
        id: verify_run
        run: |
          RUN_DIR="${{ steps.download.outputs.run_dir }}"

          if [ -z "$RUN_DIR" ] || [ ! -d "$RUN_DIR" ]; then
            echo "::error::Run directory not found. Previous plan run artifact may be missing."
            exit 1
          fi

          STATE_FILE="$RUN_DIR/.symphony-loop.local.md"
          if [ ! -f "$STATE_FILE" ]; then
            echo "::error::State file not found at $STATE_FILE. Cannot resume run."
            exit 1
          fi

          PLAN_JSON="$RUN_DIR/plan.json"
          if [ ! -f "$PLAN_JSON" ]; then
            echo "::error::plan.json not found at $PLAN_JSON"
            exit 1
          fi

          QUESTIONS_FILE="$RUN_DIR/investigation-questions.md"
          if [ ! -f "$QUESTIONS_FILE" ]; then
            echo "::error::investigation-questions.md not found. This run may not have questions to answer."
            exit 1
          fi

          echo "Run directory verified: $RUN_DIR"
          echo "State file found: $STATE_FILE"
          echo "Questions file found: $QUESTIONS_FILE"
          echo "Plan JSON found: $PLAN_JSON"

      - name: Validate Comment Length
        env:
          USER_COMMENT: ${{ github.event.comment.body }}
        run: |
          COMMENT_LENGTH=${#USER_COMMENT}
          MAX_LENGTH=10240

          if [ "$COMMENT_LENGTH" -gt "$MAX_LENGTH" ]; then
            echo "::error::Comment length ($COMMENT_LENGTH bytes) exceeds maximum allowed ($MAX_LENGTH bytes)"
            exit 1
          fi

          echo "✅ Comment length validated: $COMMENT_LENGTH bytes (max: $MAX_LENGTH)"

      - name: Parse and Merge Answers
        id: parse_answers
        env:
          USER_COMMENT: ${{ github.event.comment.body }}
        run: |
          RUN_DIR="${{ steps.download.outputs.run_dir }}"
          PLAN_JSON="$RUN_DIR/plan.json"
          QUESTIONS_FILE="$RUN_DIR/investigation-questions.md"
          TEMP_ANSWERS="/tmp/parsed-answers.json"
          ANSWERS_TEXT_FILE="/tmp/user-answers.txt"

          # Extract question IDs and full questions from investigation-questions.md
          # Store them for matching
          declare -A QUESTIONS
          while IFS= read -r line; do
            if [[ "$line" =~ ^##[[:space:]]+(Q-[0-9]{3}):[[:space:]]*(.+)$ ]]; then
              Q_ID="${BASH_REMATCH[1]}"
              Q_TITLE="${BASH_REMATCH[2]}"
              QUESTIONS["$Q_ID"]="$Q_TITLE"
            fi
          done < "$QUESTIONS_FILE"

          # Save user comment to file for processing
          echo "$USER_COMMENT" | sed 's/@symphony-cl answer//g' > "$ANSWERS_TEXT_FILE"

          # Create answeredQuestions array
          echo "[]" > "$TEMP_ANSWERS"

          # Try to extract structured answers (Q-###: answer format)
          # If that fails, fall back to line-by-line matching
          STRUCTURED_ANSWERS=0
          for Q_ID in "${!QUESTIONS[@]}"; do
            # Look for Q-ID in the comment (case insensitive, flexible spacing)
            ANSWER=$(grep -i "^[[:space:]]*${Q_ID}[[:space:]]*:" "$ANSWERS_TEXT_FILE" | sed "s/^[[:space:]]*${Q_ID}[[:space:]]*:[[:space:]]*//" || echo "")

            if [ -n "$ANSWER" ]; then
              STRUCTURED_ANSWERS=$((STRUCTURED_ANSWERS + 1))
              QUESTION_TEXT="${QUESTIONS[$Q_ID]}"

              # Add to answeredQuestions array
              TEMP_CONTENT=$(jq --arg id "$Q_ID" \
                                --arg question "$QUESTION_TEXT" \
                                --arg answer "$ANSWER" \
                                '. += [{"id": $id, "question": $question, "answer": $answer}]' \
                                "$TEMP_ANSWERS")
              echo "$TEMP_CONTENT" > "$TEMP_ANSWERS"
            fi
          done

          # If no structured answers found, fall back to sequential line matching
          if [ "$STRUCTURED_ANSWERS" -eq 0 ]; then
            echo "No structured Q-ID: format found, using fallback sequential matching"

            # Filter out empty lines and the trigger command
            ANSWER_LINES=$(grep -v '^[[:space:]]*$' "$ANSWERS_TEXT_FILE" | grep -v '@symphony-cl')

            ANSWER_COUNTER=0
            for Q_ID in $(echo "${!QUESTIONS[@]}" | tr ' ' '\n' | sort); do
              ANSWER_COUNTER=$((ANSWER_COUNTER + 1))
              ANSWER=$(echo "$ANSWER_LINES" | sed -n "${ANSWER_COUNTER}p")

              if [ -n "$ANSWER" ]; then
                QUESTION_TEXT="${QUESTIONS[$Q_ID]}"

                TEMP_CONTENT=$(jq --arg id "$Q_ID" \
                                  --arg question "$QUESTION_TEXT" \
                                  --arg answer "$ANSWER" \
                                  '. += [{"id": $id, "question": $question, "answer": $answer}]' \
                                  "$TEMP_ANSWERS")
                echo "$TEMP_CONTENT" > "$TEMP_ANSWERS"
              fi
            done
          fi

          # Merge answeredQuestions into plan.json
          jq --slurpfile answers "$TEMP_ANSWERS" \
             '.answeredQuestions = ($answers[0])' \
             "$PLAN_JSON" > "${PLAN_JSON}.tmp"
          mv "${PLAN_JSON}.tmp" "$PLAN_JSON"

          # Validate the resulting JSON is well-formed
          if ! jq empty "$PLAN_JSON" 2>/dev/null; then
            echo "::error::Generated plan.json is invalid JSON after merging answers"
            echo "plan.json contents:"
            cat "$PLAN_JSON" || echo "(file unreadable)"
            exit 1
          fi

          echo "✅ plan.json validation passed"

          ANSWER_COUNT=$(jq '.answeredQuestions | length' "$PLAN_JSON")
          echo "Parsed and merged $ANSWER_COUNT answers into plan.json"

          if [ "$ANSWER_COUNT" -eq 0 ]; then
            echo "::warning::No answers were parsed from the comment. Please check the comment format."
          fi

          # Cleanup
          rm -f "$TEMP_ANSWERS" "$ANSWERS_TEXT_FILE"

      - name: Resume Symphony Run Loop
        id: symphony
        timeout-minutes: 60
        continue-on-error: false
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          RUN_DIR="${{ steps.download.outputs.run_dir }}"
          RUN_LOOP="${{ steps.cli_setup.outputs.run_loop_path }}"

          if [ ! -f "$RUN_LOOP" ]; then
            echo "::error::run-loop.sh not found at $RUN_LOOP"
            exit 1
          fi

          echo "Resuming Symphony run loop from: $RUN_DIR"
          echo "Using run-loop.sh: $RUN_LOOP"

          # Change to run directory and invoke run-loop.sh
          # It will read state from .symphony-loop.local.md
          cd "$RUN_DIR"
          "$RUN_LOOP"

      - name: Post Results
        id: post_results
        uses: ./.github/actions/symphony-post-results
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          comment_url: ${{ steps.status_comment.outputs.comment_url }}
          delete_old_comment: "true"

      - name: Update Status Comment on Failure
        if: failure()
        uses: ./.github/actions/update-comment-on-failure
        with:
          comment_url: ${{ steps.status_comment.outputs.comment_url }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          action_name: process answers

      - name: Sanitize Run Loop Log
        if: always()
        uses: ./.github/actions/sanitize-run-log
        with:
          log_file: ${{ steps.download.outputs.run_dir }}/run-loop.log

      - name: Upload Updated Artifact
        if: always()
        id: upload
        uses: ./.github/actions/symphony-artifact
        with:
          mode: upload
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          overwrite: "true"

      - name: Build Slack Message
        if: success()
        id: slack_message
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          ISSUE_URL="${{ github.server_url }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
          COMMENT_URL="${{ steps.post_results.outputs.comment_url }}"
          ARTIFACT_URL="${{ steps.upload.outputs.artifact_url }}"

          MSG=$(printf "<%s|#%s: %s>\nAssignees: {assignees}\nStatus: Plan ready for review\nImplementation plan: %s\nRun artifact: %s" \
            "$ISSUE_URL" "${{ github.event.issue.number }}" "$ISSUE_TITLE" "$COMMENT_URL" "${ARTIFACT_URL:-N/A}")

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: ./.github/actions/symphony-slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_SYMPHONY_WEBHOOK_URL }}
          message: ${{ steps.slack_message.outputs.message }}
          assignees_json: ${{ toJson(github.event.issue.assignees) }}

  # ============================================================================
  # EXECUTE: Implement the plan and create a PR
  # Triggered by: @symphony-cl execute
  # Requires: Previous @symphony-cl plan (or answer) run with implementation plan
  # Output: Pull request
  # ============================================================================
  execute:
    needs: detect
    if: needs.detect.outputs.command == 'execute'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: symphony-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLOSEDLOOP_APP_ID_STAGE }}
          private-key: ${{ secrets.CLOSEDLOOP_APP_SECRET_STAGE }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},claude_code
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Symphony Setup
        id: setup
        uses: ./.github/actions/symphony-setup
        with:
          github_token: ${{ steps.token.outputs.token }}
          node_version: ${{ env.NODE_VERSION }}

      - name: Setup Claude CLI
        id: cli_setup
        uses: ./.github/actions/claude-cli-setup
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}

      - name: Post Status Comment
        id: status_comment
        uses: ./.github/actions/post-status-comment
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          message: "Symphony is orchestrating agents to implement the plan..."
          github_token: ${{ steps.token.outputs.token }}

      - name: Download Run Artifact
        id: download
        uses: ./.github/actions/symphony-artifact
        with:
          mode: download
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}

      - name: Validate Artifact Ownership
        uses: ./.github/actions/validate-artifact-ownership
        with:
          run_dir: ${{ steps.download.outputs.run_dir }}
          issue_number: ${{ github.event.issue.number }}

      - name: Verify Implementation Plan
        id: verify_plan
        run: |
          LATEST_RUN=$(ls -td .claude/runs/*/ 2>/dev/null | head -1)
          LATEST_RUN="${LATEST_RUN%/}"

          if [ -z "$LATEST_RUN" ]; then
            echo "::error::No run directory found. Run @symphony-cl plan first."
            exit 1
          fi

          # Find plan file (checking in priority order)
          PLAN_PATH=""
          for f in "plan.json" "plan.md" "implementation-plan.md"; do
            if [ -f "${LATEST_RUN}/${f}" ]; then
              PLAN_PATH="${LATEST_RUN}/${f}"
              break
            fi
          done

          if [ -z "$PLAN_PATH" ]; then
            echo "::error::No implementation plan found in $LATEST_RUN"
            exit 1
          fi

          STATE_FILE="${LATEST_RUN}/.symphony-loop.local.md"
          if [ ! -f "$STATE_FILE" ]; then
            echo "::error::State file not found at $STATE_FILE. Cannot resume run."
            exit 1
          fi

          echo "Found implementation plan: $PLAN_PATH"
          echo "Found state file: $STATE_FILE"
          echo "Run directory: $LATEST_RUN"

          echo "plan_path=$PLAN_PATH" >> "$GITHUB_OUTPUT"
          echo "run_dir=$LATEST_RUN" >> "$GITHUB_OUTPUT"

      - name: Create Branch
        run: |
          git config user.name "symphony[bot]"
          git config user.email "symphony[bot]@users.noreply.github.com"
          git checkout -b issue-${{ github.event.issue.number }}
          git push -u origin issue-${{ github.event.issue.number }}

      - name: Prepare Issue Content
        id: issue_content
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          BODY=$(echo "$ISSUE_BODY" | tr '\n\r' '  ' | sed 's/  */ /g')
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Symphony Implementation (experimental)
        id: symphony
        timeout-minutes: 120
        continue-on-error: false
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          RUN_DIR="${{ steps.verify_plan.outputs.run_dir }}"
          RUN_LOOP="${{ steps.cli_setup.outputs.run_loop_path }}"

          if [ ! -f "$RUN_LOOP" ]; then
            echo "::error::run-loop.sh not found at $RUN_LOOP"
            exit 1
          fi

          if [ ! -d "$RUN_DIR" ]; then
            echo "::error::Run directory not found: $RUN_DIR"
            exit 1
          fi

          echo "Running Symphony implementation from: $RUN_DIR"
          echo "Using run-loop.sh: $RUN_LOOP"

          # Export run directory for downstream steps
          echo "LATEST_RUN=$RUN_DIR" >> "$GITHUB_ENV"

          # Change to run directory and invoke run-loop.sh
          # It will read state from .symphony-loop.local.md and execute the plan
          cd "$RUN_DIR"
          "$RUN_LOOP" --max-iterations 150 2>&1 | tee run-loop.log

          echo "Symphony implementation completed"

      - name: Sanitize Run Loop Log
        if: always()
        uses: ./.github/actions/sanitize-run-log
        with:
          log_file: ${{ steps.verify_plan.outputs.run_dir }}/run-loop.log

      - name: Upload Run Loop Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: run-loop-execute-log-${{ github.event.issue.number }}
          path: ${{ steps.verify_plan.outputs.run_dir }}/run-loop.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and Push Changes
        id: commit_push
        run: |
          # Check if there are changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Stage all changes
          git add -A

          # Create commit message
          COMMIT_MSG="Implement #${{ github.event.issue.number }}: ${{ steps.issue_content.outputs.title }}

          Closes #${{ github.event.issue.number }}

          Generated with Symphony"

          git commit -m "$COMMIT_MSG"
          git push origin issue-${{ github.event.issue.number }}

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Create Pull Request
        id: create_pr
        if: steps.commit_push.outputs.has_changes == 'true'
        run: |
          PR_BODY="## Summary

          Implementation of #${{ github.event.issue.number }}: ${{ steps.issue_content.outputs.title }}

          Closes #${{ github.event.issue.number }}

          ## Implementation

          See the implementation plan and code changes for details.

          ---
          Generated with Symphony"

          PR_URL=$(gh pr create \
            --title "Implement #${{ github.event.issue.number }}: ${{ steps.issue_content.outputs.title }}" \
            --body "$PR_BODY" \
            --label symphony \
            --head issue-${{ github.event.issue.number }} \
            --base main)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Get PR URL
        id: get_pr
        run: |
          # Use PR URL from create_pr step if available, otherwise query
          PR_URL="${{ steps.create_pr.outputs.pr_url }}"
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list --head "issue-${{ github.event.issue.number }}" --state open --json url --jq '.[0].url')
          fi
          if [ -n "$PR_URL" ]; then
            echo "Found PR: $PR_URL"
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Update Status Comment with PR Link
        if: success()
        run: |
          COMMENT_URL="${{ steps.status_comment.outputs.comment_url }}"
          PR_URL="${{ steps.get_pr.outputs.pr_url }}"

          if [ -n "$COMMENT_URL" ] && [ -n "$PR_URL" ]; then
            COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
            if [ -n "$COMMENT_ID" ]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                -f body="✅ Implementation complete!

          🚀 **Pull request created:** $PR_URL

          The implementation has been reviewed and tested. Please review the PR for final approval." || true
            fi
          elif [ -z "$PR_URL" ]; then
            # No PR was created (no changes), update comment accordingly
            COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
            if [ -n "$COMMENT_ID" ]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                -f body="✅ Symphony completed, but no code changes were made. The implementation plan may have already been applied or no changes were needed." || true
            fi
          fi
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Update Status Comment on Failure
        if: failure()
        uses: ./.github/actions/update-comment-on-failure
        with:
          comment_url: ${{ steps.status_comment.outputs.comment_url }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          action_name: implement the plan

      - name: Build Slack Message
        if: success()
        id: slack_message
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          ISSUE_URL="${{ github.server_url }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
          PR_URL="${{ steps.get_pr.outputs.pr_url }}"
          ARTIFACT_URL="${{ steps.download.outputs.artifact_url }}"

          MSG=$(printf "Github issue: <%s|#%s: %s>\nAssignees: {assignees}\nStatus: Implementation complete" "$ISSUE_URL" "${{ github.event.issue.number }}" "$ISSUE_TITLE")
          if [ -n "$PR_URL" ]; then
            MSG=$(printf "%s\nPR created: %s" "$MSG" "$PR_URL")
          fi
          MSG=$(printf "%s\nRun artifact: %s" "$MSG" "${ARTIFACT_URL:-N/A}")

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: ./.github/actions/symphony-slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_SYMPHONY_WEBHOOK_URL }}
          message: ${{ steps.slack_message.outputs.message }}
          assignees_json: ${{ toJson(github.event.issue.assignees) }}

  # ============================================================================
  # CHAT: Fallback for any @symphony-cl mention without a recognized command
  # Triggered by: @symphony-cl <anything not plan/answer/execute>
  # If implementation-plan.md exists: Uses /symphony-core:amend-plan for plan amendments
  # Otherwise: Attempts to respond to freeform questions
  # ============================================================================
  chat:
    needs: detect
    if: needs.detect.outputs.command == 'chat'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: symphony-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      actions: write
      id-token: write

    steps:
      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLOSEDLOOP_APP_ID_STAGE }}
          private-key: ${{ secrets.CLOSEDLOOP_APP_SECRET_STAGE }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},claude_code
          permission-contents: write
          permission-issues: write
          permission-actions: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ steps.token.outputs.token }}

      - name: Symphony Setup
        id: setup
        uses: ./.github/actions/symphony-setup
        with:
          github_token: ${{ steps.token.outputs.token }}
          node_version: ${{ env.NODE_VERSION }}

      - name: Post Status Comment
        id: status_comment
        uses: ./.github/actions/post-status-comment
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          message: "Symphony is processing your request..."
          github_token: ${{ steps.token.outputs.token }}

      - name: Try Download Previous Run Artifact
        id: download
        continue-on-error: true
        uses: ./.github/actions/symphony-artifact
        with:
          mode: download
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}

      - name: Prepare Context
        id: context
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          USER_COMMENT: ${{ github.event.comment.body }}
        run: |
          RUN_DIR="${{ steps.download.outputs.run_dir }}"
          if [ -n "$RUN_DIR" ] && [ -d "$RUN_DIR" ]; then
            echo "has_context=true" >> "$GITHUB_OUTPUT"
            echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"

            # Find plan file (checking in priority order)
            PLAN_FILE=""
            for f in "plan.json" "plan.md" "implementation-plan.md"; do
              if [ -f "${RUN_DIR}/${f}" ]; then
                PLAN_FILE="${RUN_DIR}/${f}"
                break
              fi
            done

            if [ -n "$PLAN_FILE" ]; then
              echo "has_plan=true" >> "$GITHUB_OUTPUT"
              echo "plan_file=$PLAN_FILE" >> "$GITHUB_OUTPUT"
              echo "Found plan file: $PLAN_FILE - will use amend workflow"
            else
              echo "has_plan=false" >> "$GITHUB_OUTPUT"
              echo "No plan file found - will use chat workflow"
            fi
          else
            echo "has_context=false" >> "$GITHUB_OUTPUT"
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
            echo "run_dir=" >> "$GITHUB_OUTPUT"
          fi

          # Pass issue info using heredoc
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          BODY=$(echo "$ISSUE_BODY" | tr '\n\r' '  ' | sed 's/  */ /g')
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Escape double quotes for --message argument parsing
          COMMENT=$(echo "$USER_COMMENT" | tr '\n\r' '  ' | sed 's/  */ /g')
          COMMENT="${COMMENT//\"/\\\"}"
          echo "comment<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Symphony Plan Amend
        id: symphony_amend
        if: steps.context.outputs.has_plan == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          github_token: ${{ steps.token.outputs.token }}
          show_full_output: true
          allowed_bots: "closedloop-ai-stage,closedloop-ai"
          plugin_marketplaces: |
            https://github.com/closedloop-ai/claude_code.git
          plugins: |
            symphony-core@closedloop
            symphony-fe@closedloop
            experimental@closedloop
          prompt: /symphony-core:amend-plan --run-dir ${{ steps.context.outputs.run_dir }} --message "${{ steps.context.outputs.comment }}"
          claude_args: |
            --max-turns 200
            --allowedTools "Bash,Glob,Grep,Read,Write,Edit,Task,Skill,SlashCommand,TodoWrite"

      - name: Prepare Amend Response
        id: prepare_amend_response
        if: steps.context.outputs.has_plan == 'true' && success()
        run: |
          RUN_DIR="${{ steps.context.outputs.run_dir }}"
          AMEND_STATE="$RUN_DIR/amend-session.json"
          RUN_STATE="$RUN_DIR/state.json"

          # Extract the conversation JSON for Claude to summarize
          # If amend-session.json exists, the conversation is still active
          # If it was deleted (apply was called), check state.json for amended.conversation
          if [ -f "$AMEND_STATE" ]; then
            CONVERSATION=$(jq -c '.conversation' "$AMEND_STATE")
          elif [ -f "$RUN_STATE" ]; then
            CONVERSATION=$(jq -c '.amended.conversation' "$RUN_STATE")
          fi

          if [ -n "$CONVERSATION" ] && [ "$CONVERSATION" != "null" ]; then
            echo "$CONVERSATION" > "${{ runner.temp }}/amend-conversation.json"
            echo "has_conversation=true" >> "$GITHUB_OUTPUT"
          else
            echo "Warning: No conversation found in state files"
            echo "has_conversation=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Format Amend Response
        id: format_amend_response
        if: steps.context.outputs.has_plan == 'true' && success() && steps.prepare_amend_response.outputs.has_conversation == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          github_token: ${{ steps.token.outputs.token }}
          show_full_output: true
          allowed_bots: "closedloop-ai-stage,closedloop-ai"
          prompt: |
            Read the conversation JSON at ${{ runner.temp }}/amend-conversation.json and write a human-readable summary of what was accomplished to ${{ runner.temp }}/amend-response.md.

            The summary should:
            - Be concise and suitable for a GitHub issue comment
            - Highlight the key changes or actions taken
            - Use markdown formatting
            - NOT include raw JSON or technical details about tool calls
            - Be written from the perspective of reporting what Symphony did

            Write ONLY the summary file, no other output.
          claude_args: |
            --max-turns 100
            --allowedTools "Read,Write"

      - name: Upload Updated Artifact (Amend)
        id: upload_amend
        if: steps.context.outputs.has_plan == 'true' && success()
        uses: ./.github/actions/symphony-artifact
        with:
          mode: upload
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          overwrite: "true"

      - name: Mark Old Plan Comments
        if: steps.context.outputs.has_plan == 'true' && success()
        run: |
          # Get comment IDs from symphony-cl[bot] that have current Implementation Plan (not already marked old)
          COMMENT_IDS=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            --paginate \
            --jq '[.[] | select(.user.login == "symphony-cl[bot]") | select(.body | contains("<summary><strong>📋 Implementation Plan</strong>")) | select(.body | contains("Old Implementation Plan") | not) | .id] | .[]')

          for COMMENT_ID in $COMMENT_IDS; do
            echo "Marking comment $COMMENT_ID as old plan..."

            # Fetch the full comment body
            COMMENT_BODY=$(gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" --jq '.body')

            # Replace "Implementation Plan" with "Old Implementation Plan" in the summary
            UPDATED_BODY=$(echo "$COMMENT_BODY" | sed 's/<summary><strong>📋 Implementation Plan<\/strong>/<summary><strong>📋 Old Implementation Plan<\/strong>/g')

            # Update the comment using a temp file to handle multiline content
            echo "$UPDATED_BODY" > /tmp/updated-comment.md
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              --input <(jq -n --rawfile body /tmp/updated-comment.md '{"body": $body}') || true
          done
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Post Amend Results
        if: steps.context.outputs.has_plan == 'true' && success()
        uses: ./.github/actions/symphony-post-results
        with:
          issue_number: ${{ github.event.issue.number }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          comment_url: ${{ steps.status_comment.outputs.comment_url }}
          artifact_url: ${{ steps.upload_amend.outputs.artifact_url }}

      - name: Update Status Comment on Amend Failure
        if: steps.context.outputs.has_plan == 'true' && failure()
        uses: ./.github/actions/update-comment-on-failure
        with:
          comment_url: ${{ steps.status_comment.outputs.comment_url }}
          repository: ${{ github.repository }}
          github_token: ${{ steps.token.outputs.token }}
          action_name: process amendment

      - name: Run Symphony Chat
        id: symphony
        if: steps.context.outputs.has_plan != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          github_token: ${{ steps.token.outputs.token }}
          show_full_output: true
          allowed_bots: "closedloop-ai-stage,closedloop-ai"
          plugin_marketplaces: |
            https://github.com/closedloop-ai/claude_code.git
          plugins: |
            symphony-core@closedloop
            symphony-fe@closedloop
            experimental@closedloop
          prompt: |
            You are Symphony, an AI assistant helping with GitHub issue #${{ github.event.issue.number }}.

            Issue Title: ${{ steps.context.outputs.title }}
            Issue Body: ${{ steps.context.outputs.body }}

            User's message: ${{ steps.context.outputs.comment }}

            ${{ steps.context.outputs.has_context == 'true' && format('Previous planning context is available at: {0}', steps.context.outputs.run_dir) || 'No previous planning context exists for this issue.' }}

            Instructions:
            1. If previous context exists, read the relevant files (implementation-plan.md, investigation-questions.md, investigation-log.md) to understand the current state
            2. Respond helpfully to the user's message/question
            3. Write your response to a file at .claude/chat-response.md
            4. Keep your response focused and actionable

            Available commands the user can use:
            - @symphony-cl plan - Generate an implementation plan from the issue
            - @symphony-cl answer - Provide answers to open questions
            - @symphony-cl execute - Implement the plan and create a PR

            If the user seems to want one of these actions, suggest the appropriate command.
          claude_args: |
            --max-turns 200
            --allowedTools "Bash(find:*),Bash(ls:*),Glob,Grep,Read,Write,TodoWrite"

      - name: Post Response
        id: post_response
        if: steps.context.outputs.has_plan != 'true'
        run: |
          RESPONSE_FILE=".claude/chat-response.md"

          if [ -f "$RESPONSE_FILE" ]; then
            BODY=$(cat "$RESPONSE_FILE")
          else
            # Fallback message if no response file was created
            BODY="I couldn't process that request. Try one of these commands:
          - \`@symphony-cl plan\` - Generate an implementation plan
          - \`@symphony-cl answer\` - Provide answers to open questions
          - \`@symphony-cl execute\` - Implement the plan and create a PR"
          fi

          COMMENT_URL="${{ steps.status_comment.outputs.comment_url }}"
          if [ -n "$COMMENT_URL" ]; then
            COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
            if [ -n "$COMMENT_ID" ]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                -f body="$BODY" || true
            fi
          fi
          echo "comment_url=$COMMENT_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
