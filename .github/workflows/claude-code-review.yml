name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs for the same PR to prevent duplicate reviews
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Filter by PR author or allow bot actors like Dependabot
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]') ||
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]')

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write
      issues: read
      actions: read
      id-token: write

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SYMPHONY_APP_ID }}
          private-key: ${{ secrets.SYMPHONY_APP_SECRET }}
          owner: ${{ github.repository_owner }}
          # Access to claude_code repo required for private plugin marketplace (symphony-core, symphony-fe plugins)
          repositories: ${{ github.event.repository.name }},claude_code
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write
          permission-actions: read

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          # Dependabot PRs need full history (fetch-depth: 0) to analyze dependency changes
          # Regular PRs only need the latest commit (fetch-depth: 1) for faster checkout
          fetch-depth: ${{ contains(github.head_ref || github.ref_name, 'dependabot/') && '0' || '1' }}

      - name: Verify checkout matches PR head
        if: github.event.pull_request.head.sha != ''
        shell: bash
        run: |
          EXPECTED_SHA="${{ github.event.pull_request.head.sha }}"
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::warning::Checkout mismatch: expected $EXPECTED_SHA, got $ACTUAL_SHA. Re-fetching..."
            git fetch origin "$EXPECTED_SHA" --depth=1
            git checkout "$EXPECTED_SHA"
            echo "HEAD is now: $(git rev-parse HEAD)"
          else
            echo "Checkout verified: HEAD is $ACTUAL_SHA"
          fi

      - name: Configure Git for Private Marketplace
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Determine review command
        id: determine-command
        run: |
          # Uses /gh-code-review from .claude/commands/gh-code-review.md
          # This runs the multi-agent code review that posts inline comments to the PR
          # --detailed flag enables verbose output showing validation steps and discarded findings
          echo "command=/gh-code-review --detailed" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.generate_token.outputs.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_NEW }}
          show_full_output: true
          plugin_marketplaces: |
            https://github.com/closedloop-ai/claude_code.git
          plugins: |
            symphony-core@closedloop
            symphony-fe@closedloop

          # Allow bot actors like Dependabot to trigger Claude code review
          allowed_bots: "dependabot"

          # Direct prompt for automated review
          prompt: "${{ steps.determine-command.outputs.command }}"

          claude_args: |
            --mcp-config '{"mcpServers": {"context7": {"type": "http", "url": "https://mcp.context7.com/mcp"}}}'
            --allowedTools "Read,Task,TodoWrite,Grep,Glob,mcp__github_inline_comment__create_inline_comment,mcp__context7__resolve-library-id,mcp__context7__get-library-docs,Bash(gh:*),Bash(gh api:*),Bash(gh api -X:*),Bash(gh api -F:*),Bash(gh api -f:*),Bash(gh pr:*),Bash(git:*),Bash(git show:*),Bash(git diff:*),Bash(git log:*),Bash(env:*),Bash(grep:*),Bash(ls:*),Bash(jq:*),Bash(cat:*),Bash(pnpm:*),Bash(npx:*),Bash(node:*),Bash(tsc:*),Bash(python:*),Bash(FIND_SCRIPT:*),Bash(RESULT:*)"

          # Sticky comments disabled - was causing streaming mode errors
          use_sticky_comment: false

      - name: Review completed
        if: always()
        run: |
          echo "Code review workflow completed"
          echo "Review outcome: ${{ steps.claude-review.outcome }}"
          # Always exit 0 so the workflow passes - review is advisory, not blocking
          exit 0
