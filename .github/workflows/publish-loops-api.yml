name: Publish @closedloop/loops-api

on:
  push:
    branches: [main]
    paths:
      - "packages/loops-api/**"
  workflow_dispatch: {}

concurrency:
  group: publish-loops-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@closedloop"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=@closedloop/loops-api

      - name: Publish to GitHub Packages
        working-directory: packages/loops-api
        # pnpm publish applies publishConfig.exports to swap source → dist paths.
        # --no-git-checks: CI runs on a detached HEAD.
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
