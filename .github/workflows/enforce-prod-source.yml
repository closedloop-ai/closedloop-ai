name: Enforce production source branch
on:
  pull_request:
    branches: [production]

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source is this repo's main branch
        if: github.head_ref != 'main' || github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::PRs to production must come from this repo's main branch."
          echo "Source: ${{ github.event.pull_request.head.repo.full_name }}/${{ github.head_ref }}"
          exit 1
