name: 'Symphony Slack Notification'
description: 'Send Symphony workflow notifications to Slack'
inputs:
  webhook_url:
    description: 'Slack webhook URL'
    required: true
  message:
    description: 'Pre-formatted message text (supports \n for newlines). Use {assignees} placeholder to insert parsed assignees.'
    required: true
  assignees_json:
    description: 'JSON array of assignees (e.g., from toJson(github.event.issue.assignees)). Will replace {assignees} in message.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Send Slack notification
      shell: bash
      run: |
        MESSAGE="${{ inputs.message }}"

        # Parse assignees if provided
        if [ -n '${{ inputs.assignees_json }}' ] && [ '${{ inputs.assignees_json }}' != '[]' ]; then
          ASSIGNEES=$(echo '${{ inputs.assignees_json }}' | jq -r 'map(.login) | join(", ")')
          if [ -z "$ASSIGNEES" ]; then
            ASSIGNEES="None"
          fi
        else
          ASSIGNEES="None"
        fi

        # Replace {assignees} placeholder
        MESSAGE="${MESSAGE//\{assignees\}/$ASSIGNEES}"

        # Build JSON payload with jq (handles escaping)
        PAYLOAD=$(jq -n --arg text "$MESSAGE" '{text: $text}')

        curl -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "${{ inputs.webhook_url }}"
