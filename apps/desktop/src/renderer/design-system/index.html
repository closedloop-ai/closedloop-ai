<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Closedloop Gateway</title>
    <style>
    html,
    body,
    #root {
      min-height: 100%;
      margin: 0;
    }

    body {
      background: #0f1723;
      color: #e5e7eb;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    .initial-shell {
      display: grid;
      min-height: 100vh;
      place-items: center;
    }

    .initial-shell__panel {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .initial-shell__mark {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(229, 231, 235, 0.3);
      border-top-color: #e5e7eb;
      border-radius: 999px;
    }

    .initial-shell__title {
      font-size: 14px;
      font-weight: 600;
    }

    .initial-shell__status {
      color: #94a3b8;
      font-size: 12px;
    }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-shell">
        <div class="initial-shell__panel">
          <div aria-hidden="true" class="initial-shell__mark"></div>
          <div class="initial-shell__title">Closedloop</div>
          <div class="initial-shell__status">Starting Desktop...</div>
        </div>
      </div>
    </div>
    <script src="./renderer-ready-signal.ts" type="module"></script>
    <script src="../main.tsx" type="module"></script>
  </body>
</html>
