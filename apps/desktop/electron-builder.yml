appId: ai.closedloop.desktop
productName: Closedloop

files:
  - app/**/*
  - package.json

beforeBuild: ./scripts/use-staged-node-modules.mjs

extraResources:
  - from: resources/icon-1024.png
    to: icon-1024.png
  - from: resources/trayIconTemplate.png
    to: trayIconTemplate.png
  - from: resources/trayIconTemplate@2x.png
    to: trayIconTemplate@2x.png
  # First-party agent-monitor hook handlers (FEA-1503), shipped unpacked outside
  # the asar so they resolve as real files. agent-monitor-hooks.ts copies them
  # into userData at install time; the installed hook command runs them via the
  # Electron binary as Node (ELECTRON_RUN_AS_NODE) against that userData copy.
  - from: resources/hooks
    to: hooks
    filter:
      - "*.js"
  - from: resources/command-packs
    to: command-packs
    filter:
      - "**/*"
  # Bundled coaching packs (overridable best-practice signal sets for Agent
  # Coaching Tips). agent-coaching-packs.ts seeds these into userData on first
  # run and the active pack's signals replace the built-in defaults.
  - from: resources/coaching-packs
    to: coaching-packs
    filter:
      - "**/*"

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

publish:
  provider: generic
  # Packaged clients read the public API updater feed. The API authenticates
  # to GitHub server-side and serves only Desktop updater metadata/assets.
  url: https://api.closedloop.ai/desktop/updates

directories:
  output: dist-dmg
